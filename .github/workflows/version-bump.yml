name: Bump patch version

on:
  push:
    branches: [main]

jobs:
  bump:
    # Skip version-bump commits to prevent an infinite loop
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Get new version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Commit through the GitHub API (createCommitOnBranch) instead of
      # `git push`. API commits are signed by GitHub's web-flow key, so
      # they appear as "Verified" — a plain git commit here would not.
      - name: Commit bumped version (signed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_OID=$(git rev-parse HEAD)
          PKG_B64=$(base64 -w0 package.json)
          LOCK_B64=$(base64 -w0 package-lock.json)
          gh api graphql \
            -f query='mutation($repo:String!,$branch:String!,$oid:GitObjectID!,$pkg:Base64String!,$lock:Base64String!,$msg:String!) {
              createCommitOnBranch(input:{
                branch:{repositoryNameWithOwner:$repo, branchName:$branch},
                expectedHeadOid:$oid,
                fileChanges:{additions:[
                  {path:"package.json", contents:$pkg},
                  {path:"package-lock.json", contents:$lock}
                ]},
                message:{headline:$msg}
              }) { commit { oid url } }
            }' \
            -f repo="${{ github.repository }}" \
            -f branch="main" \
            -f oid="$HEAD_OID" \
            -f pkg="$PKG_B64" \
            -f lock="$LOCK_B64" \
            -f msg="chore: bump version to ${{ steps.ver.outputs.version }}"
